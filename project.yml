name: WrenchLog
options:
  bundleIdPrefix: com.theknack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "7"
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 TheKnack"
    DEVELOPMENT_TEAM: "99H9NJ6Z6J"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "WrenchLog"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

targets:
  WrenchLog:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/GenerateAppIcon.swift"
    resources:
      - path: Sources/Resources
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/WrenchLog.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.theknack.wrenchlog
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: NO
    dependencies:
      - package: TelemetryDeck
    postBuildScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        name: SwiftLint

  WrenchLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: WrenchLog

  WrenchLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: WrenchLog

schemes:
  WrenchLog:
    build:
      targets:
        WrenchLog: all
        WrenchLogTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: WrenchLogTests
        - name: WrenchLogUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
